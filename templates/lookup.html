{% extends "base.html" %}
{% block title %}Scan Your ID{% endblock %}
{% block content %}
<h2>Scan Your ID</h2>
<p class="hint">Upload a clear photo of your document. We'll match it against your bank record automatically.</p>

<form method="POST" class="form-card" enctype="multipart/form-data">
    <label>Document Type</label>
    <select name="document_type" required>
        <option value="" disabled selected>Select a document</option>
        <option value="Aadhaar">Aadhaar Card</option>
        <option value="PAN">PAN Card</option>
        <option value="Driving License">Driving License</option>
    </select>

    <label>Document Photo</label>
    <input type="file" name="document_image" accept=".png,.jpg,.jpeg" required>

    <div class="form-actions">
        <a class="btn btn-secondary" href="{{ url_for('home') }}">&larr; Back</a>
        <button type="submit" class="btn btn-primary">Find My Details &rarr;</button>
    </div>
</form>
{% endblock %}
